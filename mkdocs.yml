site_name: Android Solid Services
site_url: https://androidsolidservices.erfangholami.com
site_description: Single Solid sign-in for the Android ecosystem — SDK and app for accessing Solid pods.
site_author: Erfan Gholami
repo_name: Android-Solid-Services
repo_url: https://github.com/pondersource/Android-Solid-Services

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Components:
      - Solid Android API Library: api-library.md
      - Android Solid Services App: app.md
      - Solid Android Client Library: client-library.md
  - Architecture: architecture.md
  - Releases: release.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true